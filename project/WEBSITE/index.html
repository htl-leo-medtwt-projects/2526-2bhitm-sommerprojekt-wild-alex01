<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Adventures</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <script src="./items.js" defer></script>
</head>

<body>

    <div class="loading-screen" id="loadingScreen">
        <div class="bg bg1"></div>
        <div class="bg bg2"></div>

        <div class="overlay"></div>

        <div class="content">
            <div class="title">Entering the Abyss...</div>
            <div class="tip" id="tip"></div>

            <div class="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>
        </div>
    </div>
    <h1 id="headerText" onclick="gotoMainMenu()">Dark Adventures</h1>

    <section id="MainMenu" style="display: none;">
        <p onclick="loadGame()">Load Game</p>
        <p>Leaderboard</p>
        <p>About</p>
    </section>

    <section id="loadGame">
        <div id="loadBox">
            <p class="start-btn" onclick="startGame('new')"> ▶ START</p>
            <p>Neuer Spielstand</p>
        </div>
    </section>

    <section id="createChar">
        <h1 class="cc">Create Char</h1>
        <div id="charBox"></div>
        <div id="charPreview"></div>
        <div class="input">
            <input type="text" id="charNameInput" placeholder="Enter your name...">
            <div style="margin: 0 auto;">
            <button class="confirmStart" onclick="confirmChar()">Start Adventure</button>
            </div>
        </div>
    </section>

    <section id="game">
        <div id="inventoryUI"></div>
    </section>
</body>

</html>
